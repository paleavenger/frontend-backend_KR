version: '3.8'

services:
  backend1:
    build: .
    environment:
      - PORT=3000

  backend2:
    build: .
    environment:
      - PORT=3000

  backend3:
    build: .
    environment:
      - PORT=3000

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend1
      - backend2
      - backend3

  haproxy:
    image: haproxy:alpine
    ports:
      - "8080:80"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    depends_on:
      - backend1
      - backend2
