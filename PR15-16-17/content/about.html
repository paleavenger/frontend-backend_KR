<div class="about-box">
    <h2>О приложении</h2>
    <span class="version-badge">v1.0.0</span>
    <p>Приложение для управления списком задач с поддержкой офлайн-режима.</p>
    <p>Построено на архитектуре App Shell, каркас грузится мгновенно из кэша, а контент подгружается динамически.</p>
    <p>Данные хранятся в <strong style="color:#60a5fa;">localStorage</strong> и не теряются при отключении сети.</p>
</div>
